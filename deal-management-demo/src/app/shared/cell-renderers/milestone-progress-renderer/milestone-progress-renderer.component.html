<span class="milestones">
  <span class="milestones__label">{{ label() }}</span>
  @if (hasTotal()) {
    <span class="milestones__bar" role="progressbar" [attr.aria-valuenow]="percent()" aria-valuemin="0" aria-valuemax="100">
      <span class="milestones__fill" [style.width.%]="percent()"></span>
    </span>
  }
</span>
