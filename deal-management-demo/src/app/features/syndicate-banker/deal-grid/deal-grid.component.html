<div class="grid-container">
  <div class="grid-toolbar">
    <div class="grid-toolbar__left">
      <h2 class="grid-title">Syndicate Banker — Book-Building Pipeline</h2>
      <span class="grid-subtitle">Coverage multiple is the primary risk signal</span>
    </div>
    @if (selectedCount() > 0) {
      <div class="bulk-bar">
        <span class="bulk-bar__count">{{ selectedCount() }} selected</span>
        <button class="btn btn--secondary">Export CSV</button>
        <button class="btn btn--ghost" (click)="clearSelection()">Clear</button>
      </div>
    }
  </div>

  @if (hasError()) {
    <div class="state-message state-message--error">Failed to load deals. Please retry.</div>
  } @else if (isLoading()) {
    <div class="state-message">Loading deals…</div>
  } @else {
    <ag-grid-angular
      style="width: 100%; height: 100%;"
      [theme]="theme"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      (selectionChanged)="onSelectionChanged($event)"
    />
  }
</div>
